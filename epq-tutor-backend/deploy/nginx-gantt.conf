server {
    listen 80;
    server_name gantt.simonevo.top;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name gantt.simonevo.top;

    # SSL — certbot will fill these in after: certbot --nginx -d gantt.simonevo.top
    # ssl_certificate     /etc/letsencrypt/live/gantt.simonevo.top/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/gantt.simonevo.top/privkey.pem;

    root /opt/gantt-pro;
    index gantt-pro.html;

    location / {
        add_header Cache-Control "no-cache";
        add_header X-Frame-Options "SAMEORIGIN";
        try_files $uri /gantt-pro.html;
    }
}
