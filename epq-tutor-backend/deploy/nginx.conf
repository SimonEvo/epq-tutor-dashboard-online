server {
    listen 80;
    server_name _;  # replace with your domain

    root /opt/epq-tutor/dist;
    index index.html;

    # Gzip compression — reduces API JSON and asset transfer by ~70%
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    # Frontend SPA — index.html must never be cached (references hashed assets)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri /index.html;
    }

    # Vite-built assets have content-hash filenames — safe to cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Other static files (favicon, manifest, etc.)
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    # Backend API (includes /auth and /health)
    location ~ ^/(api|auth|health) {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
